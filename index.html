<!DOCTYPE html>
<html>
<head>
  <link href="style.css" rel="stylesheet" type="text/css">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn to Fly 3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    iframe {
      width: 100vw;
      height: 75vw;
      max-height: 100vh;
      max-width: 133.33vh;
      border: none;
      display: block;
    }
  </style>
</head>
<body class='back'>
  <iframe id="main" scrolling="no" frameborder="0" allowtransparency="true" allow="fullscreen" allowfullscreen></iframe>

  <script>
    var swfPath = "learn-to-fly3.swf";

    var t = '<script src="https://unpkg.com/@ruffle-rs/ruffle"><\/script>'
          + '<embed width="100%" height="100%" name="plugin" id="plugin" src="' + swfPath + '" type="application/x-shockwave-flash">';

    var e = document.getElementById("main");
    e = e.contentWindow || e.contentDocument.document || e.contentDocument;
    e.document.open();
    e.document.write(t);
    e.document.close();
  </script>
</body>
</html>
